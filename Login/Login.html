<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Login.css">

    <title>Login-Page</title>
</head>
<body>
    <div class="Login" id="loginContainer">
        <h1>Login</h1>
        <form id="loginForm">
            <label for="Email">Email</label>
            <br>
            <input type="email" name="email" id="email" placeholder="Enter email" required>
            <br><br>
            <label for="Password">Password</label>
            <br>
            <input type="password" name="password" id="password" placeholder="Enter Password" required>
            <br><br>
            <!-- <input class="button" type="submit" name="Login" value="Login"> -->
             <button type="submit" class="button" id="loginbtn">Login</button>
             <p id="message"></p>

             <p>Create Account : </p>
            <button class="btn" id="signUp">Sign Up</button>
        </form>        
    </div>
    <div class="Login" id="registerContainer"  style="display: none;">
        <h1>Register</h1>
        <form action="" method="post">
            <label for="fNmae">First Name</label>
            <br>
            <i class="fa-solid fa-user"></i>
            <input type="text" name="fName" placeholder="First Name">
            <br><br>
            <label for="lName">Last Name</label>
            <br>
            <i class="fa-solid fa-user"></i>
            <input type="text" name="lName" placeholder="Last Name">
            <br><br>
            <label for="Email">Email</label>
            <br>
            <i class="fa-solid fa-envelope"></i>
            <input type="email" name="email" id="email" placeholder="Enter email" required>
            <br><br>
            <label for="Password">Password</label>
            <br>
            <input type="password" name="password" id="password" placeholder="Enter Password" required>
            <br><br>
            <input type="submit" id="SignUpButton" class="button" value="Sign Up" name="SignUp">

            <p>-----------------------------OR-----------------------------</p>
            <p>Already Have Account ?</p>
            <button class="btn" id="signIn">Sign In</button>

        </form>
    
    </div>
    
    <script src="Login.js"></script>
</body>
</html>
